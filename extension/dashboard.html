<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACW Assistant — Call Summaries Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      padding: 0;
    }

    /* ── Header ── */
    .header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: #f1f5f9;
    }

    .header-subtitle {
      font-size: 13px;
      color: #64748b;
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn-clear {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #ef4444;
      background: transparent;
      color: #ef4444;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-clear:hover {
      background: #ef444420;
    }

    /* ── Stats Bar ── */
    .stats-bar {
      display: flex;
      gap: 0;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }

    .stat-card {
      flex: 1;
      padding: 24px 32px;
      border-right: 1px solid #334155;
    }

    .stat-card:last-child {
      border-right: none;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: #f1f5f9;
      line-height: 1;
    }

    .stat-value.green { color: #22c55e; }
    .stat-value.blue  { color: #3b82f6; }

    .stat-label {
      font-size: 12px;
      color: #64748b;
      margin-top: 6px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Main Content ── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 16px;
    }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 96px 24px;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-title {
      font-size: 18px;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 8px;
    }

    .empty-text {
      font-size: 14px;
      color: #64748b;
    }

    /* ── Summary Table ── */
    .summary-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .summary-row {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 20px 24px;
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 20px;
      transition: border-color 0.15s;
    }

    .summary-row:hover {
      border-color: #3b82f6;
    }

    .summary-meta-col {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .summary-datetime {
      font-size: 12px;
      color: #94a3b8;
      font-weight: 500;
    }

    .summary-duration {
      font-size: 12px;
      color: #64748b;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-category {
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.25);
    }

    .badge-sentiment-positive {
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.25);
    }

    .badge-sentiment-negative {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.25);
    }

    .badge-sentiment-neutral {
      background: rgba(100, 116, 139, 0.15);
      color: #94a3b8;
      border: 1px solid rgba(100, 116, 139, 0.25);
    }

    .quality-score {
      font-size: 12px;
      color: #94a3b8;
    }

    .quality-score strong {
      color: #f59e0b;
    }

    .summary-content-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .summary-text {
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.65;
    }

    .action-items-section {
      margin-top: 4px;
    }

    .action-items-label {
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .action-items-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .action-items-list li {
      font-size: 13px;
      color: #94a3b8;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .action-items-list li::before {
      content: "→";
      color: #3b82f6;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .stats-bar { flex-direction: column; }
      .stat-card { border-right: none; border-bottom: 1px solid #334155; }
      .summary-row { grid-template-columns: 1fr; }
      .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="header-icon">&#9889;</div>
      <div>
        <div class="header-title">ACW Assistant</div>
        <div class="header-subtitle">Call Summaries Dashboard</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-clear" id="clearAllBtn">Clear All</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-value blue" id="statTotal">—</div>
      <div class="stat-label">Total Calls</div>
    </div>
    <div class="stat-card">
      <div class="stat-value green" id="statAvgQuality">—</div>
      <div class="stat-label">Avg Quality Score</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statPositive">—</div>
      <div class="stat-label">Positive Sentiment</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statTopCategory">—</div>
      <div class="stat-label">Top Category</div>
    </div>
  </div>

  <div class="main">
    <div class="section-title">All Call Summaries</div>
    <div id="summaryList" class="summary-list"></div>
    <div id="emptyState" class="empty-state" style="display:none;">
      <div class="empty-icon">&#128222;</div>
      <div class="empty-title">No summaries yet</div>
      <div class="empty-text">Enable auto-summarize in the extension popup and finish a call to see your first summary here.</div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
